version: '3.8'

services:
  kisan-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  kisan-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/usr/src/app/src
      - ./client/public:/usr/src/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - NODE_ENV=development
    depends_on:
      - kisan-server
    restart: unless-stopped
